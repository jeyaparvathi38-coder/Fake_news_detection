<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detection System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.2">
</head>
<body class="dark-theme">
    <!-- Animated Background -->
    <div class="particles-bg" id="particles-bg"></div>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <i class="fa-solid fa-shield-halved brand-icon text-primary"></i>
                <span class="brand-text">News<span class="text-secondary">Shield</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-4 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'detect' %}active{% endif %}" href="{{ url_for('detect') }}">Detect News</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'insights' %}active{% endif %}" href="{{ url_for('insights') }}">Model Insights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'methodology' %}active{% endif %}" href="{{ url_for('methodology') }}">Methodology</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 text-center mt-auto" style="background-color: var(--darker); border-top: 1px solid rgba(255,255,255,0.05);">
        <p class="text-muted mb-0">© 2026 AI Fake News Detection System. Built with DistilBERT.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Global Ripple Effect Script -->
    <script>
        document.addEventListener('click', function(e) {
            // Find closest clickable element
            const target = e.target.closest('a, button, .nav-link, .custom-btn, .glass-card');
            if (!target) return;
            
            const rect = target.getBoundingClientRect();
            const ripple = document.createElement('span');
            
            const diameter = Math.max(rect.width, rect.height);
            const radius = diameter / 2;
            
            ripple.style.width = ripple.style.height = `${diameter}px`;
            ripple.style.left = `${e.clientX - rect.left - radius}px`;
            ripple.style.top = `${e.clientY - rect.top - radius}px`;
            ripple.classList.add('ripple-effect');
            
            // Remove existing ripples to avoid clutter
            const existingRipple = target.querySelector('.ripple-effect');
            if (existingRipple) {
                existingRipple.remove();
            }
            
            target.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
